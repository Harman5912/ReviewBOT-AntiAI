services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=reviewbot
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=reviewbot
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1
      - OPENROUTER_DEFAULT_MODEL=${OPENROUTER_DEFAULT_MODEL:-google/gemini-2.5-flash}
      - OPENROUTER_REVIEW_MODEL=${OPENROUTER_REVIEW_MODEL:-openrouter/owl-alpha}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - CONFIDENCE_THRESHOLD=0.70
      - REVIEW_CONCURRENCY=5
      - CLONE_BASE_PATH=/tmp/reviewbot
    volumes:
      - reviewbot-clones:/tmp/reviewbot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/main
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=reviewbot
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=reviewbot
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1
      - OPENROUTER_DEFAULT_MODEL=${OPENROUTER_DEFAULT_MODEL:-google/gemini-2.5-flash}
      - OPENROUTER_REVIEW_MODEL=${OPENROUTER_REVIEW_MODEL:-openrouter/owl-alpha}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - CONFIDENCE_THRESHOLD=0.70
      - REVIEW_CONCURRENCY=10
      - CLONE_BASE_PATH=/tmp/reviewbot
    volumes:
      - reviewbot-clones:/tmp/reviewbot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
          cpus: '4'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reviewbot
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: reviewbot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  reviewbot-clones:
